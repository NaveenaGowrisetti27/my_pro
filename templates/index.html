<!DOCTYPE html>
<html>
<head>
    <title>Iris Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
        }

        h2 {
            color: green;
        }
    </style>
</head>

<body>

    <h1>Iris Flower Classification</h1>

    <form action="/predict" method="post">

        <input type="text" name="sepal_length"
               placeholder="Sepal Length (cm)" required><br>

        <input type="text" name="sepal_width"
               placeholder="Sepal Width (cm)" required><br>

        <input type="text" name="petal_length"
               placeholder="Petal Length (cm)" required><br>

        <input type="text" name="petal_width"
               placeholder="Petal Width (cm)" required><br>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
